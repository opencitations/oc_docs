site_name: OpenCitations Documentation
site_url: https://docs.opencitations.net/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - API:
    - Quick start: api/quickstart.md
    - Use cases: api/use-cases.md
    - How-to guides:
      - Filtering & sorting: api/guides/filtering.md
      - Pagination: api/guides/pagination.md
      - Output formats: api/guides/output-formats.md
      - Error handling: api/guides/error-handling.md
    - Concepts:
      - Data model: api/concepts/data-model.md
      - What are OCIs: api/concepts/oci.md
      - Index vs Meta: api/concepts/index-vs-meta.md
  - Search:
    - How to: search/howto.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
